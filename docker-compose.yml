version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: macro_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-macro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-macro_secret}
      POSTGRES_DB: ${POSTGRES_DB:-macrodb}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-macro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: macro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macro_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macro_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macro_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler

  binance_consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macro_binance_ws
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.workers.binance_consumer

  # ── Auto-seeder (runs once after backend is healthy) ─────────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macro_seeder
    restart: "no"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo '=== Auto-seeder: backend ready, triggering data fetch ===' &&
        curl -sf http://backend:8000/api/trigger/backfill       && echo 'backfill queued' &&
        curl -sf http://backend:8000/api/trigger/backfill-sentiment && echo 'sentiment queued' &&
        curl -sf http://backend:8000/api/trigger/calendar       && echo 'calendar queued' &&
        echo '=== Seeding complete — data will appear in ~2 min ==='
      "

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: macro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  timescale_data:
  redis_data:
