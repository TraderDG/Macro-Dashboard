# ── Phase-1: HTTP only ─────────────────────────────────────────────────────────
# Used during first deploy to pass Let's Encrypt ACME challenge before certs exist.
# Replaced by prod.conf after certbot succeeds.

events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Macro Terminal — awaiting SSL certificate\n';
            add_header Content-Type text/plain;
        }
    }
}
