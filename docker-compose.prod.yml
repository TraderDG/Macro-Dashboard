version: "3.9"

# ── Production stack ──────────────────────────────────────────────────────────
# Uses: TimescaleDB + Redis + Celery + nginx SSL + Next.js standalone build
# Run: docker compose -f docker-compose.prod.yml up -d

services:

  # ── Reverse proxy + SSL ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: macro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── SSL certs (certbot — run manually, then cron renews) ────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: macro_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  # ── Database ─────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: macro_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 15
    # NOT exposed externally — internal Docker network only

  # ── Cache + message broker ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: macro_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # NOT exposed externally

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: macro_backend:prod
    container_name: macro_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Celery worker (background tasks) ─────────────────────────────────────────
  celery_worker:
    image: macro_backend:prod
    container_name: macro_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ── Celery beat (scheduler) ───────────────────────────────────────────────────
  celery_beat:
    image: macro_backend:prod
    container_name: macro_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - celery_worker
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Binance WebSocket consumer ───────────────────────────────────────────────
  binance_consumer:
    image: macro_backend:prod
    container_name: macro_binance_ws
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.workers.binance_consumer

  # ── One-shot seeder (runs once, skips if DB has data) ────────────────────────
  seeder:
    image: macro_backend:prod
    container_name: macro_seeder
    restart: "no"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Seeder: triggering backfill ===' &&
        curl -sf http://backend:8000/api/trigger/backfill          && echo ' backfill OK' &&
        curl -sf http://backend:8000/api/trigger/backfill-sentiment && echo ' sentiment OK' &&
        curl -sf http://backend:8000/api/trigger/calendar           && echo ' calendar OK' &&
        echo '=== Seeding queued — data ready in ~5 min ==='
      "

  # ── Next.js frontend (production build) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Empty = same-origin; nginx routes /api/* to backend
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL:  ""
    image: macro_frontend:prod
    container_name: macro_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  timescale_data:
  redis_data:
  certbot_certs:
  certbot_webroot:
